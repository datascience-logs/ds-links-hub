<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hub | Data Science Diaries</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --orange: #FF6B35;
            --navy: #0A1929;
            --navy-light: #152238;
            --white: #FFFFFF;
        }

        body {
            background-color: var(--navy);
            color: var(--white);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 🚪 LOGIN FORM STYLING */
        #login-form {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--navy-light);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* 📊 DASHBOARD STYLING */
        #dashboard {
            display: none;
            width: 100%;
            max-width: 1000px;
            margin: 20px;
            align-self: flex-start;
        }

        .card { background: var(--navy-light); border-radius: 16px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,107,53,0.1); }
        .input { width: 100%; background: #0d1b2a; border: 1px solid #2a3e52; color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .btn { background: var(--orange); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background: #ff8555; transform: translateY(-2px); }

        .link-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr auto; 
            gap: 10px; 
            background: rgba(0,0,0,0.2); 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- 🔐 SUPABASE LOGIN -->
    <div id="login-form">
        <img src="../ds.log.jpg" style="width: 100px; border-radius: 50%; border: 2px solid var(--orange); margin-bottom: 20px;">
        <h2>Supabase Login</h2>
        <input type="email" id="email" class="input" placeholder="Email Address">
        <input type="password" id="password" class="input" placeholder="Password">
        <button class="btn" onclick="handleLogin()">Sign In</button>
        <p id="error-msg" style="color: #ff4a4a; margin-top: 15px; display: none;">Login Failed</p>
    </div>

    <!-- 🛡️ DASHBOARD -->
    <div id="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>🛡️ Supabase Control</h1>
            <button class="btn" style="width: auto;" onclick="handleLogout()">Logout</button>
        </div>

        <div class="card">
            <div id="links-list"></div>
            <button class="btn" onclick="addNewLink()" style="margin-top: 20px; background: transparent; border: 1px solid var(--orange);">+ Add New Link</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ezsziemqkrktxurdxqbl.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6c3ppZW1xa3JrdHh1cmR4cWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNzg3NjgsImV4cCI6MjA5Mjc1NDc2OH0.pAjwSSdbpRzkqKALgg7q_XFT1-8aHLmp0kEljfy1RV0";

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) document.getElementById('error-msg').style.display = 'block';
        }

        async function handleLogout() {
            await supabase.auth.signOut();
        }

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                fetchLinks();
            } else {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        async function fetchLinks() {
            const { data, error } = await supabase.from('links').select('*').order('order', { ascending: true });
            if (!error) renderLinks(data);
        }

        function renderLinks(links) {
            const container = document.getElementById('links-list');
            container.innerHTML = '';
            links.forEach(link => {
                const row = document.createElement('div');
                row.className = 'link-row';
                row.innerHTML = `
                    <input class="input" value="${link.title}" onchange="updateLink(${link.id}, 'title', this.value)" style="margin:0">
                    <input class="input" value="${link.url}" onchange="updateLink(${link.id}, 'url', this.value)" style="margin:0">
                    <button onclick="deleteLink(${link.id})" style="color: #ff4a4a; background: none; border: none; cursor: pointer;">🗑️</button>
                `;
                container.appendChild(row);
            });
        }

        async function updateLink(id, field, value) {
            await supabase.from('links').update({ [field]: value }).eq('id', id);
        }

        async function addNewLink() {
            await supabase.from('links').insert([{ title: 'New Link', url: 'https://', order: Date.now() }]);
            fetchLinks();
        }

        async function deleteLink(id) {
            await supabase.from('links').delete().eq('id', id);
            fetchLinks();
        }
    </script>
</body>
</html>
