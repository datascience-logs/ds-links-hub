<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Data Science Logs</title>

    <!-- 1. Decap CMS Config -->
    <script>
        window.CMS_CONFIG = {
            backend: {
                name: 'github',
                repo: 'datascience-logs/ds-links-hub',
                branch: 'main'
            },
            local_backend: true,
            display_url: "https://datascience-logs.github.io",
            logo_url: "https://datascience-logs.github.io/ds.log.jpg",
            collections: [
                {
                    name: "links_data",
                    label: "Manage Links",
                    file: "data/links.json",
                    fields: [
                        { label: "Links List", name: "links", widget: "list", fields: [
                            { label: "Title", name: "title", widget: "string" },
                            { label: "URL", name: "url", widget: "string" },
                            { label: "Description", name: "description", widget: "string", required: false },
                            { label: "Active", name: "isActive", widget: "boolean", default: true },
                            { label: "Order", name: "order", widget: "number", default: 10 }
                        ]}
                    ]
                }
            ]
        };
    </script>

    <style>
        /* Premium Dark Admin Theme */
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@700&display=swap');

        :root {
            --orange: #FF6B35;
            --navy: #0A1929;
            --navy-light: #0D1B2A;
            --navy-elevated: #152238;
            --white: #FFFFFF;
        }

        body { font-family: 'DM Sans', sans-serif; background-color: var(--navy); }

        /* Login Screen Customization */
        .login-screen {
            background: var(--navy) !important;
            background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255, 107, 53, 0.15), transparent) !important;
        }

        .login-container {
            background: var(--navy-light) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 16px !important;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5) !important;
        }

        .login-button {
            background: var(--orange) !important;
            border-radius: 8px !important;
            font-weight: 600 !important;
        }

        /* Dash Overlay */
        .cms-root {
            font-family: 'DM Sans', sans-serif !important;
        }
    </style>
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.1.0/dist/decap-cms.js"></script>
</body>
</html>
