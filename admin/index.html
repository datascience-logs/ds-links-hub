<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hub | Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --orange: #FF6B35; --orange-glow: rgba(255, 107, 53, 0.4); --bg-deep: #050a14; --bg-card: #0f172a; --bg-glass: rgba(15, 23, 42, 0.8); --border: rgba(255, 255, 255, 0.08); --text-main: #f8fafc; --text-dim: #94a3b8; --sidebar-w: 260px; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; min-height: 100vh; }
        #login-form { position: fixed; inset: 0; background: var(--bg-deep); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: var(--bg-card); padding: 48px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        #dashboard { display: none; flex: 1; width: 100%; }
        .sidebar { width: var(--sidebar-w); background: var(--bg-glass); backdrop-filter: blur(20px); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; position: fixed; height: 100vh; }
        .sidebar-brand { font-weight: 800; font-size: 1.2rem; color: var(--orange); margin-bottom: 40px; }
        .main-view { margin-left: var(--sidebar-w); flex: 1; padding: 40px; max-width: 1400px; }
        .glass-card { background: var(--bg-glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 20px; padding: 32px; margin-bottom: 24px; }
        .input { width: 100%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 12px 14px; border-radius: 10px; box-sizing: border-box; transition: 0.2s; font-size: 0.85rem; }
        .input:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 4px var(--orange-glow); }
        .btn { background: var(--orange); color: white; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px var(--orange-glow); }
        .link-editor-row { display: grid; grid-template-columns: 1.2fr 1.8fr 0.8fr 0.6fr 0.8fr auto; gap: 10px; padding: 16px; background: rgba(255,255,255,0.02); border-radius: 16px; margin-bottom: 12px; align-items: end; border: 1px solid transparent; }
        .link-editor-row:hover { border-color: rgba(255,107,53, 0.3); }
        .field-label { font-size: 0.65rem; color: var(--orange); font-weight: 800; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.05em; }
        #toast { position: fixed; bottom: 32px; right: 32px; background: #10b981; color: white; padding: 16px 24px; border-radius: 12px; font-weight: 600; transform: translateY(100px); transition: 0.4s; z-index: 2000; }
        #toast.show { transform: translateY(0); }
        .save-btn { background: #10b981; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        .save-btn:hover { background: #059669; }
    </style>
</head>
<body>

    <div id="login-form">
        <div class="login-card">
            <div style="width: 80px; height: 80px; margin: 0 auto 24px; border-radius: 50%; padding: 4px; background: linear-gradient(45deg, var(--orange), #ff9f1c); overflow: hidden;">
                <img src="../ds.log.jpg" alt="DS" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
            </div>
            <h2 style="margin-bottom: 32px;">Master Hub Access</h2>
            <input type="email" id="email" class="input" placeholder="Email">
            <input type="password" id="password" class="input" placeholder="Password" style="margin-top: 10px;">
            <button id="signin-btn" class="btn" style="width: 100%; margin-top: 15px;" onclick="doLogin()">Authorize Access</button>
            <p id="error-msg" style="color: #ef4444; margin-top: 16px; font-size: 0.85rem; display: none;"></p>
        </div>
    </div>

    <div id="dashboard">
        <nav class="sidebar">
            <div class="sidebar-brand">Datascience<span>.logs</span></div>
            <div class="btn" onclick="doLogout()" style="margin-top: auto; background: none; border: 1px solid #ef4444; color: #ef4444; text-align: center;">Logout</div>
        </nav>

        <main class="main-view">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                <div>
                    <h1 style="margin: 0; font-size: 1.8rem;">Command Center</h1>
                    <p style="color: var(--text-dim); margin-top: 4px;">Manual Save Control Enabled</p>
                </div>
                <button class="btn" onclick="createNewLink()">+ Create New Link</button>
            </div>
            <div class="glass-card" id="links-container-admin"></div>
        </main>
    </div>

    <div id="toast">Saved!</div>

    <script>
        const SUPABASE_URL = "https://ezsziemqkrktxurdxqbl.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6c3ppZW1xa3JrdHh1cmR4cWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNzg3NjgsImV4cCI6MjA5Mjc1NDc2OH0.pAjwSSdbpRzkqKALgg7q_XFT1-8aHLmp0kEljfy1RV0";
        let client;

        function genCode() { return "DS_" + Math.floor(1000 + Math.random() * 9000); }

        window.addEventListener('load', () => {
            if (window.supabase) {
                client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                checkAuth();
            }
        });

        async function checkAuth() {
            const { data: { session } } = await client.auth.getSession();
            if (session) {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                refreshLinks();
            }
        }

        async function doLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            const { error } = await client.auth.signInWithPassword({ email: e, password: p });
            if (error) { alert(error.message); } else { location.reload(); }
        }

        async function doLogout() { await client.auth.signOut(); location.reload(); }

        async function refreshLinks() {
            const { data } = await client.from('links').select('*').order('order', { ascending: true });
            const list = document.getElementById('links-container-admin');
            list.innerHTML = data.map(l => `
                <div class="link-editor-row" id="row-${l.id}">
                    <div>
                        <span class="field-label">Title</span>
                        <input class="input" id="title-${l.id}" value="${l.title || ''}">
                    </div>
                    <div>
                        <span class="field-label">URL</span>
                        <input class="input" id="url-${l.id}" value="${l.url || ''}">
                    </div>
                    <div>
                        <span class="field-label">Code</span>
                        <div style="display:flex; gap:4px;">
                            <input class="input" id="code-${l.id}" value="${l.code || ''}">
                            <button onclick="magicCode(${l.id})" style="background:rgba(255,107,53,0.1); border:none; padding:8px; border-radius:8px; cursor:pointer;">✨</button>
                        </div>
                    </div>
                    <div>
                        <span class="field-label">Media</span>
                        <label style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; cursor:pointer; font-size:0.65rem; display:block; border:1px dashed var(--border); text-align:center;" for="file-${l.id}">📎 PDF</label>
                        <input type="file" id="file-${l.id}" accept=".pdf" style="display:none" onchange="uploadPDF(${l.id}, this)">
                    </div>
                    <button class="save-btn" id="btn-${l.id}" onclick="saveRow(${l.id})">💾 SAVE</button>
                    <button onclick="killLink(${l.id})" style="color:#ef4444; background:none; border:none; cursor:pointer; padding-bottom:12px;">🗑️</button>
                </div>
            `).join('');
        }

        async function saveRow(id) {
            const btn = document.getElementById(`btn-${id}`);
            const title = document.getElementById(`title-${id}`).value;
            const url = document.getElementById(`url-${id}`).value;
            const code = document.getElementById(`code-${id}`).value;
            
            btn.innerText = "WAIT...";
            const { error } = await client.from('links').update({ title, url, code }).eq('id', id);
            
            if (!error) {
                btn.innerText = "💾 SAVE";
                showToast("Confirmed: Link Saved!");
            } else {
                alert(error.message);
                btn.innerText = "ERROR";
            }
        }

        async function magicCode(id) {
            const newCode = genCode();
            document.getElementById(`code-${id}`).value = newCode;
            showToast("Magic Code ready. Click SAVE.");
        }

        async function uploadPDF(id, input) {
            const file = input.files[0];
            if (!file) return;
            showToast("Uploading PDF...");
            const fileName = `${Date.now()}_${file.name}`;
            const { data, error } = await client.storage.from('assets').upload(fileName, file);
            if (error) { alert(error.message); return; }
            const { data: { publicUrl } } = client.storage.from('assets').getPublicUrl(fileName);
            document.getElementById(`url-${id}`).value = publicUrl;
            showToast("PDF Linked. Click SAVE.");
        }

        async function createNewLink() {
            const code = genCode();
            const { data, error } = await client.from('links').insert([{ title: 'New Resource', url: 'https://', code: code, order: Date.now() }]).select();
            if (!error) { refreshLinks(); showToast("Created! Don't forget to SAVE changes."); }
        }

        async function killLink(id) {
            if(confirm("Delete permanently?")) {
                await client.from('links').delete().eq('id', id);
                refreshLinks();
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
