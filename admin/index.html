<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel | Data Science Logs Hub</title>

    <!-- Decap CMS Config -->
    <script>
        window.CMS_CONFIG = {
            backend: {
                name: 'github',
                repo: 'datascience-logs/ds-links-hub',
                branch: 'main'
            },
            local_backend: true,
            display_url: "https://datascience-logs.github.io/ds-links-hub/",
            site_url: "https://datascience-logs.github.io/ds-links-hub/",
            logo_url: "../ds.log.jpg",
            
            // The "Control Panel" Structure
            collections: [
                {
                    name: "links_data",
                    label: "🔗 Link Management",
                    delete: true,
                    editor: { preview: false },
                    files: [
                        {
                            name: "links",
                            label: "Main Links List",
                            file: "data/links.json",
                            fields: [
                                {
                                    label: "Active Links",
                                    name: "links",
                                    widget: "list",
                                    allow_add: true,
                                    summary: "{{title}} ({{url}})",
                                    fields: [
                                        { label: "Link Title", name: "title", widget: "string", hint: "Example: My Twitter" },
                                        { label: "URL Path", name: "url", widget: "string", hint: "https://..." },
                                        { label: "Description", name: "description", widget: "string", required: false },
                                        { 
                                            label: "Visual Icon", 
                                            name: "icon", 
                                            widget: "select", 
                                            options: ["github", "instagram", "youtube", "linkedin", "twitter", "x", "discord", "email", "blog", "portfolio", "website", "default"],
                                            default: "default"
                                        },
                                        { label: "Visible on Site", name: "isActive", widget: "boolean", default: true },
                                        { label: "Display Rank", name: "order", widget: "number", default: 10 }
                                    ]
                                }
                            ]
                        }
                    ]
                },
                {
                    name: "settings",
                    label: "⚙️ Site Settings",
                    files: [
                        {
                            name: "general",
                            label: "Basic Info",
                            file: "data/settings.json",
                            fields: [
                                { label: "Brand Name", name: "site_name", widget: "string", default: "Data Science Logs" },
                                { label: "Global Bio", name: "site_description", widget: "text" },
                                { label: "Instagram Link", name: "instagram", widget: "string" }
                            ]
                        }
                    ]
                }
            ]
        };
    </script>

    <style>
        /* Modern Pro Dashboard Styling */
        :root {
            --orange: #FF6B35;
            --navy: #0A1929;
            --white: #FFFFFF;
        }

        /* Customize Decap CMS UI */
        .nc-app-header {
            background-color: var(--navy) !important;
            border-bottom: 2px solid var(--orange) !important;
        }

        .nc-app-header-logo {
            font-weight: 800 !important;
            letter-spacing: -1px !important;
            color: var(--orange) !important;
        }

        .nc-sidebar-link-active {
            background-color: rgba(255, 107, 53, 0.1) !important;
            border-left: 4px solid var(--orange) !important;
            color: var(--orange) !important;
        }

        /* "Best Button" Effects */
        .nc-ui-btn-primary {
            background: var(--orange) !important;
            border-radius: 8px !important;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3) !important;
            transition: all 0.2s ease !important;
        }

        .nc-ui-btn-primary:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.5) !important;
        }
    </style>
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.1.0/dist/decap-cms.js"></script>
</body>
</html>
