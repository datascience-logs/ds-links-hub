<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hub | Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --orange: #FF6B35; --navy: #0A1929; --navy-light: #152238; --white: #FFFFFF; }
        body { background-color: var(--navy); color: var(--white); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card { background: var(--navy-light); padding: 40px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .input { width: 100%; background: #0d1b2a; border: 1px solid #2a3e52; color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .btn { background: var(--orange); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; }
        #dashboard { display: none; width: 90%; max-width: 1000px; align-self: flex-start; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="login-form" class="card">
        <h2 style="margin-bottom: 30px;">Security Portal</h2>
        <input type="email" id="email" class="input" placeholder="Email">
        <input type="password" id="password" class="input" placeholder="Password">
        <button id="signin-btn" class="btn" onclick="handleLogin()">Sign In</button>
        <p id="error-msg" style="color: #ff4a4a; display: none; margin-top: 15px; font-size: 0.9rem;"></p>
    </div>

    <div id="dashboard">
        <div style="display: flex; justify-content: space-between; margin-bottom: 30px;">
            <h1>🛡️ Link Control</h1>
            <button class="btn" style="width: auto; background: none; border: 1px solid #ff4a4a; color: #ff4a4a;" onclick="handleLogout()">Logout</button>
        </div>
        <div class="card" style="max-width: 100%; text-align: left;">
            <div id="links-list"></div>
            <button class="btn" onclick="addNewLink()" style="background: transparent; border: 1px solid var(--orange); margin-top: 20px;">+ Add New Link</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ezsziemqkrktxurdxqbl.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6c3ppZW1xa3JrdHh1cmR4cWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNzg3NjgsImV4cCI6MjA5Mjc1NDc2OH0.pAjwSSdbpRzkqKALgg7q_XFT1-8aHLmp0kEljfy1RV0";
        
        let supabase;

        // Initialize only when library is ready
        window.addEventListener('load', () => {
            if (window.supabase) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                checkUser();
            } else {
                console.error("Supabase library failed to load");
            }
        });

        async function checkUser() {
            const { data: { session } } = await supabase.auth.getSession();
            toggleUI(!!session);
        }

        async function handleLogin() {
            const btn = document.getElementById('signin-btn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const err = document.getElementById('error-msg');

            btn.innerText = "Processing...";
            err.style.display = 'none';

            try {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                checkUser();
            } catch (e) {
                err.innerText = e.message;
                err.style.display = 'block';
                btn.innerText = "Sign In";
            }
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            location.reload();
        }

        function toggleUI(isLoggedIn) {
            document.getElementById('login-form').style.display = isLoggedIn ? 'none' : 'block';
            document.getElementById('dashboard').style.display = isLoggedIn ? 'block' : 'none';
            document.body.style.alignItems = isLoggedIn ? 'flex-start' : 'center';
            if (isLoggedIn) fetchLinks();
        }

        async function fetchLinks() {
            const { data } = await supabase.from('links').select('*').order('order', { ascending: true });
            const list = document.getElementById('links-list');
            list.innerHTML = data.map(l => `
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input class="input" value="${l.title}" onchange="updateLink(${l.id}, 'title', this.value)" style="margin:0">
                    <input class="input" value="${l.url}" onchange="updateLink(${l.id}, 'url', this.value)" style="margin:0">
                    <button onclick="deleteLink(${l.id})" style="background: none; border: none; cursor: pointer;">🗑️</button>
                </div>
            `).join('');
        }

        async function updateLink(id, field, value) {
            await supabase.from('links').update({ [field]: value }).eq('id', id);
        }

        async function addNewLink() {
            await supabase.from('links').insert([{ title: 'New', url: 'https://', order: Date.now() }]);
            fetchLinks();
        }

        async function deleteLink(id) {
            if(confirm("Delete?")) {
                await supabase.from('links').delete().eq('id', id);
                fetchLinks();
            }
        }
    </script>
</body>
</html>
